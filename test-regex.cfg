global
  log stdout format raw local0 debug
defaults
  log global
  mode http
  timeout connect 5s
  timeout client 5s
  timeout server 5s
frontend test
  bind *:8082
  
  acl is_v2_subpath path_reg ^/v2/.*
  acl is_v2_root    path /v2/ /v2
  
  http-request set-var(txn.repo) str("test-repo")
  http-request replace-path ^/v2/(.*)$ /repository/%[var(txn.repo)]/v2/\1 if is_v2_subpath !is_v2_root
  http-request set-path /repository/%[var(txn.repo)]/v2/ if is_v2_root
  
  default_backend dummy

backend dummy
  server s1 127.0.0.1:8081
