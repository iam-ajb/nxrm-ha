# Source: nxrm-ha/templates/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nexus-nxrm-ha
  namespace: "nx-poc"
  labels:

    helm.sh/chart: nxrm-ha-90.1.0
    app.kubernetes.io/name: nxrm-ha
    app.kubernetes.io/instance: nexus
    app.kubernetes.io/version: "3.90.1"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 2
  
  updateStrategy:
    type: OnDelete
  serviceName: nexus-nxrm-ha-hl
  selector:
    matchLabels:
      app.kubernetes.io/name: nxrm-ha
      app.kubernetes.io/instance: nexus
  template:
    metadata:
      annotations:
        checksum/configmap-properties: 2c76d27bbe4f5c6b0b6facd680f58852c52b206a401a628712766ab6ec489321
      labels:
        app.kubernetes.io/name: nxrm-ha
        app.kubernetes.io/instance: nexus
    spec:
      terminationGracePeriodSeconds: 120
      initContainers:
        
        - args:
          - -c
          - mkdir -p /nexus-data/etc/logback && mkdir -p /nexus-data/log/tasks && mkdir -p
            /nexus-data/log/audit && mkdir -p /nexus-data/tmp && mkdir -p /nexus-data/cache
            && touch -a /nexus-data/log/tasks/allTasks.log && touch -a /nexus-data/log/audit/audit.log
            && touch -a /nexus-data/log/request.log && touch -a /nexus-data/etc/logback/logback-tasklogfile-appender-override.xml
            && touch -a /nexus-data/etc/nexus.properties
          command:
          - /bin/sh
          image: busybox:1.33.1
          name: chown-nexusdata-owner-to-nexus-and-init-log-dir
          resources:
            limits:
              cpu: "0.2"
              memory: 512Mi
            requests:
              cpu: "0.1"
              memory: 256Mi
          volumeMounts:
          - mountPath: /nexus-data
            name: nexus-data
          - mountPath: /nexus-data/tmp
            name: nexus-tmp
          - mountPath: /nexus-data/cache
            name: nexus-cache
      containers:
        - name: nxrm-app
          image: sonatype/nexus3:3.90.1
          imagePullPolicy: IfNotPresent
          securityContext:
            
            runAsUser: null
          lifecycle:
          ports:
            - name: nexus-ui
              containerPort: 8081
            - name: docker-5000
              containerPort: 5000
            - name: docker-5001
              containerPort: 5001
            - name: docker-5002
              containerPort: 5002
            - name: docker-5003
              containerPort: 5003
            - name: docker-5004
              containerPort: 5004
            - name: docker-5005
              containerPort: 5005
            - name: docker-5006
              containerPort: 5006
            - name: docker-5007
              containerPort: 5007
            - name: docker-5008
              containerPort: 5008
            - name: docker-5009
              containerPort: 5009
            - name: docker-5010
              containerPort: 5010
          resources:
            
            limits:
              cpu: 2
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /service/rest/v1/status
              port: 8081
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 180
          livenessProbe:
            httpGet:
              path: /service/rest/v1/status
              port: 8081
            initialDelaySeconds: 0
            periodSeconds: 60
            timeoutSeconds: 1
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /service/rest/v1/status
              port: 8081
            initialDelaySeconds: 0
            periodSeconds: 60
            timeoutSeconds: 1
            failureThreshold: 6
          env:
            - name: DB_NAME
              value: "nexus"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nxrm-ha-dbsecret
                  key: db-password
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: nxrm-ha-dbsecret
                  key: db-user
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: nxrm-ha-dbsecret
                  key: db-host
          
            - name: NEXUS_SECURITY_INITIAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nxrm-ha-adminsecret
                  key: nexus-admin-password
            - name: NEXUS_SECURITY_RANDOMPASSWORD
              value: "false"
            - name: NEXUS_ZERO_DOWNTIME_ENABLED
              value: "false"
            - name: LICENSE_FILE
              value: /var/nexus-repo-license/nexus-repo-license.lic
          
            - name: INSTALL4J_ADD_VM_PARAMS
              value: "-Xms2703m -Xmx2703m -Dnexus.licenseFile=${LICENSE_FILE} \
          -Dnexus.datastore.clustered.enabled=true -Djava.util.prefs.userRoot=${NEXUS_DATA}/javaprefs \
          -Dnexus.datastore.nexus.jdbcUrl=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME} \
          -Dnexus.datastore.nexus.username=${DB_USER} \
          -Dnexus.datastore.nexus.password=${DB_PASSWORD}"
          
          volumeMounts:
            - name: nxrm-secrets
              mountPath: /nxrm-secrets
            - name: license-volume
              mountPath: /var/nexus-repo-license
              readOnly: true
          
            - name: nexus-data
              mountPath: /nexus-data
            - name: logback-tasklogfile-override
              mountPath: /nexus-data/etc/logback/logback-tasklogfile-appender-override.xml
              subPath: logback-tasklogfile-appender-override.xml
          
            - mountPath: /nexus-data/etc/nexus.properties
              name: nxrm-ha-properties
              subPath: nexus.properties
              
            - mountPath: /nexus-data/tmp
              name: nexus-tmp
            - mountPath: /nexus-data/cache
              name: nexus-cache
        - name: request-log
          image: busybox:1.33.1
          args: [/bin/sh, -c, 'tail -n+1 -F /nexus-data/log/request.log']
          volumeMounts:
            - name: nexus-data
              mountPath: /nexus-data
          resources:
            
            limits:
              cpu: "0.2"
              memory: 512Mi
            requests:
              cpu: "0.1"
              memory: 256Mi
        - name: audit-log
          image: busybox:1.33.1
          args: [/bin/sh, -c, 'tail -n+1 -F /nexus-data/log/audit/audit.log']
          volumeMounts:
            - name: nexus-data
              mountPath: /nexus-data
          resources:
            
            limits:
              cpu: "0.2"
              memory: 512Mi
            requests:
              cpu: "0.1"
              memory: 256Mi
        - name: tasks-log
          image: busybox:1.33.1
          args: [/bin/sh, -c, 'tail -n+1 -F /nexus-data/log/tasks/allTasks.log']
          volumeMounts:
            - name: nexus-data
              mountPath: /nexus-data
          resources:
            
            limits:
              cpu: "0.2"
              memory: 512Mi
            requests:
              cpu: "0.1"
              memory: 256Mi
        
        
      volumes:
        - name: nxrm-ha-properties
          configMap:
            name: nxrm-ha-properties
            items:
            - key: nexus.properties
              path: nexus.properties
        
        - emptyDir: {}
          name: nexus-tmp
        - emptyDir: {}
          name: nexus-cache
        - name: nxrm-secrets
          secret:
            secretName: nxrm-ha-dbsecret
        
      
        - name: license-volume
          secret:
            secretName: nexus-repo-license.lic
      
        - name: logback-tasklogfile-override
          configMap:
            name: nexus-nxrm-ha-logback-tasklogfile-override
            items:
              - key: logback-tasklogfile-appender-override.xml
                path: logback-tasklogfile-appender-override.xml
      
        - name: nexus-data
          persistentVolumeClaim:
            claimName: nfs-blob-pvc
