global
  log stdout format raw local0 debug
defaults
  log global
  mode http
  timeout connect 5s
  timeout client 5s
  timeout server 5s
resolvers k8s
  parse-resolv-conf
  hold valid 10s
frontend test
  bind *:8082
  default_backend nexus_cluster
backend nexus_cluster
  balance hdr(Authorization)
  server-template nexus 5 google.com:80 check resolvers k8s init-addr none
