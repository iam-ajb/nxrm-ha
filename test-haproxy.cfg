global
  log stdout format raw local0 info
  maxconn 4096

defaults
  log     global
  mode    http
  option  httplog
  option  dontlognull
  option  forwardfor
  timeout connect  60s
  timeout client   600s
  timeout server   600s
  timeout tunnel   3600s

frontend docker_frontend
  bind *:8082

  # ─── Resolve repo name from Host header ───
  # First try: exact match in host-to-repo map file
  #   e.g. docker-private.sunrise.ch → dkr-private
  # Fallback: extract first subdomain segment
  #   e.g. dkr-4-test.nexus-t01.sunrise.ch → dkr-4-test
  http-request set-var(txn.repo) req.hdr(Host),lower,map(/usr/local/etc/haproxy/host-to-repo.map)
  http-request set-var(txn.repo) req.hdr(Host),field(1,'.') if !{ var(txn.repo) -m found }

  # Set headers so Nexus generates https:// Location headers (fixes chunked push 500 error)
  http-request set-header X-Forwarded-Proto https
  http-request set-header X-Forwarded-Port 443

  # ─── URL Rewriting ───
  # Docker V2 API: /v2/<image>/... → /repository/<repo>/v2/<image>/...
  acl is_v2_subpath path_reg ^/v2/.+
  acl is_v2_root    path /v2/ /v2
  http-request replace-path ^/v2/(.*)$ /repository/%[var(txn.repo)]/v2/\1 if is_v2_subpath !is_v2_root

  # Docker version check: /v2/ → /repository/<repo>/v2/
  http-request set-path /repository/%[var(txn.repo)]/v2/ if is_v2_root

  # Requests with /repository/ prefix (from Nexus Location headers) pass through

  # ─── Response Header Rewriting ───
  # Nexus ignores X-Forwarded-Proto by default, so it generates http:// links.
  # Docker fails (times out) when trying to follow http:// links due to GKE firewalls.
  
  # Rewrite Www-Authenticate to force HTTPS for the token endpoint
  http-response replace-header Www-Authenticate ^(.*)http://(.*)$ \1https://\2

  # Rewrite Location to force HTTPS and remove `/repository/<repo>` for chunked pushes
  http-response replace-header Location ^https?://([^/]+)/repository/[^/]+/v2/(.*)$ https://\1/v2/\2

  default_backend nexus_local

backend nexus_local
  server nexus 127.0.0.1:8081 check inter 10s
---
# Source: nxrm-ha/templates/nxrm-logback-tasklogfile-override.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-nxrm-ha-logback-tasklogfile-override
  namespace: nx-poc
data:
  logback-tasklogfile-appender-override.xml: |
<included>
  <!-- Additional appender for combined task logs (k8s ingestion) -->
  <appender name="tasklogfile-aggregated" class="ch.qos.logback.core.rolling.RollingFileAppender">
    <File>${karaf.data}/log/tasks/allTasks.log</File>
    <filter class="org.sonatype.nexus.logging.TaskLogsFilter" />
    <Append>true</Append>
    <encoder class="org.sonatype.nexus.logging.NexusLayoutEncoder">
      <pattern>%d{"yyyy-MM-dd HH:mm:ss,SSSZ"} %-5p [%thread] %node %mdc{userId:-*SYSTEM} %c - %m%n</pattern>
    </encoder>
    <rollingPolicy class="ch.qos.logback.core.rolling.TimeBasedRollingPolicy">
      <fileNamePattern>${karaf.data}/log/tasks/allTasks-%d{yyyy-MM-dd}.log.gz</fileNamePattern>
      <maxHistory>1</maxHistory>
    </rollingPolicy>
  </appender>
  <root>
    <appender-ref ref="tasklogfile-aggregated" />
  </root>
</included>
---
