# Source: nxrm-ha/templates/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nexus-nxrm-ha
  namespace: "nx-poc"
  labels:

helm.sh/chart: nxrm-ha-90.1.0
app.kubernetes.io/name: nxrm-ha
app.kubernetes.io/instance: nexus
app.kubernetes.io/version: "3.90.1"
app.kubernetes.io/managed-by: Helm
spec:
  replicas: 2
  
  updateStrategy:
type: OnDelete
  serviceName: nexus-nxrm-ha-hl
  selector:
matchLabels:
  app.kubernetes.io/name: nxrm-ha
  app.kubernetes.io/instance: nexus
  template:
metadata:
  annotations:
  labels:
    app.kubernetes.io/name: nxrm-ha
    app.kubernetes.io/instance: nexus
spec:
  terminationGracePeriodSeconds: 120
  initContainers:
    
    - args:
      - -c
      - mkdir -p /nexus-data/etc/logback && mkdir -p /nexus-data/log/tasks && mkdir -p
        /nexus-data/log/audit && touch -a /nexus-data/log/tasks/allTasks.log && touch
        -a /nexus-data/log/audit/audit.log && touch -a /nexus-data/log/request.log
      command:
      - /bin/sh
      image: busybox:1.33.1
      name: chown-nexusdata-owner-to-nexus-and-init-log-dir
      resources:
        limits:
          cpu: "0.2"
          memory: 512Mi
        requests:
          cpu: "0.1"
          memory: 256Mi
      volumeMounts:
      - mountPath: /nexus-data
        name: nexus-data
  containers:
    - name: nxrm-app
      image: sonatype/nexus3:3.90.1
      imagePullPolicy: IfNotPresent
      securityContext:
        
        runAsUser: null
      lifecycle:
      ports:
        - name: nexus-ui
          containerPort: 8081
      resources:
        
        limits:
          cpu: 2
          memory: 4Gi
        requests:
          cpu: 500m
          memory: 2Gi
      startupProbe:
        httpGet:
          path: /service/rest/v1/status
          port: 8081
        initialDelaySeconds: 0
        periodSeconds: 10
        timeoutSeconds: 1
        failureThreshold: 180
      livenessProbe:
        httpGet:
          path: /service/rest/v1/status
          port: 8081
        initialDelaySeconds: 0
        periodSeconds: 60
        timeoutSeconds: 1
        failureThreshold: 6
      readinessProbe:
        httpGet:
          path: /service/rest/v1/status
          port: 8081
        initialDelaySeconds: 0
        periodSeconds: 60
        timeoutSeconds: 1
        failureThreshold: 6
      env:
        - name: DB_NAME
          value: "nexus"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nxrm-ha-dbsecret
              key: db-password
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: nxrm-ha-dbsecret
              key: db-user
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: nxrm-ha-dbsecret
              key: db-host
      
        - name: NEXUS_SECURITY_INITIAL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nxrm-ha-adminsecret
              key: nexus-admin-password
        - name: NEXUS_SECURITY_RANDOMPASSWORD
          value: "false"
        - name: NEXUS_ZERO_DOWNTIME_ENABLED
          value: "false"
        - name: LICENSE_FILE
          value: /var/nexus-repo-license/nexus-repo-license.lic
      
        - name: INSTALL4J_ADD_VM_PARAMS
          value: "-Xms2703m -Xmx2703m -Dnexus.licenseFile=${LICENSE_FILE} \
      -Dnexus.datastore.clustered.enabled=true -Djava.util.prefs.userRoot=${NEXUS_DATA}/javaprefs \
      -Dnexus.datastore.nexus.jdbcUrl=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME} \
      -Dnexus.datastore.nexus.username=${DB_USER} \
      -Dnexus.datastore.nexus.password=${DB_PASSWORD}"
      
      volumeMounts:
        - name: nxrm-secrets
          mountPath: /nxrm-secrets
        - name: license-volume
          mountPath: /var/nexus-repo-license
          readOnly: true
      
        - name: nexus-data
          mountPath: /nexus-data
        - name: logback-tasklogfile-override
          mountPath: /nexus-data/etc/logback/logback-tasklogfile-appender-override.xml
          subPath: logback-tasklogfile-appender-override.xml
      
    - name: request-log
      image: busybox:1.33.1
      args: [/bin/sh, -c, 'tail -n+1 -F /nexus-data/log/request.log']
      volumeMounts:
        - name: nexus-data
          mountPath: /nexus-data
      resources:
        
        limits:
          cpu: "0.2"
          memory: 512Mi
        requests:
          cpu: "0.1"
          memory: 256Mi
    - name: audit-log
      image: busybox:1.33.1
      args: [/bin/sh, -c, 'tail -n+1 -F /nexus-data/log/audit/audit.log']
      volumeMounts:
        - name: nexus-data
          mountPath: /nexus-data
      resources:
        
        limits:
          cpu: "0.2"
          memory: 512Mi
        requests:
          cpu: "0.1"
          memory: 256Mi
    - name: tasks-log
      image: busybox:1.33.1
      args: [/bin/sh, -c, 'tail -n+1 -F /nexus-data/log/tasks/allTasks.log']
      volumeMounts:
        - name: nexus-data
          mountPath: /nexus-data
      resources:
        
        limits:
          cpu: "0.2"
          memory: 512Mi
        requests:
          cpu: "0.1"
          memory: 256Mi
    
    
      
    - image: haproxy:2.8
      livenessProbe:
        initialDelaySeconds: 10
        periodSeconds: 30
        tcpSocket:
          port: 8082
      name: haproxy-sidecar
      ports:
      - containerPort: 8082
        name: docker-proxy
        protocol: TCP
      readinessProbe:
        initialDelaySeconds: 5
        periodSeconds: 10
        tcpSocket:
          port: 8082
      resources:
        limits:
          cpu: 200m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
      volumeMounts:
      - mountPath: /usr/local/etc/haproxy/haproxy.cfg
        name: haproxy-config
        readOnly: true
        subPath: haproxy.cfg
      - mountPath: /usr/local/etc/haproxy/host-to-repo.map
        name: haproxy-config
        readOnly: true
        subPath: host-to-repo.map
  volumes:
    
    - configMap:
        name: 'nexus-nxrm-ha-haproxy-config'
      name: haproxy-config
    - name: nxrm-secrets
      secret:
        secretName: nxrm-ha-dbsecret
    
  
    - name: license-volume
      secret:
        secretName: nexus-repo-license.lic
  
    - name: logback-tasklogfile-override
      configMap:
        name: nexus-nxrm-ha-logback-tasklogfile-override
        items:
          - key: logback-tasklogfile-appender-override.xml
            path: logback-tasklogfile-appender-override.xml
  
    - name: nexus-data
      emptyDir:
        sizeLimit: 2Gi
---
