{{- if .Values.dockerProxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexus.fullname" . }}-docker-proxy
  namespace: {{ default .Release.Namespace .Values.namespaces.nexusNs.name | quote }}
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
  {{- if .Values.service.annotations }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    {{- include "nexus.selectorLabels" . | nindent 4 }}
    {{- if .Values.nexus.extraSelectorLabels }}
      {{- with .Values.nexus.extraSelectorLabels }}
        {{ toYaml . | nindent 4 }}
      {{- end }}
    {{- end }}
  ports:
    - name: docker-proxy
      protocol: TCP
      port: {{ .Values.dockerProxy.containerPort }}
      targetPort: {{ .Values.dockerProxy.containerPort }}
{{- end }}
