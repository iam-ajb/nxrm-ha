{{- if .Values.nexusRoute.enabled }}
# Primary UI Route — uses OCP default cert (no custom cert needed)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "nexus.fullname" . }}-ui
  namespace: {{ default .Release.Namespace .Values.namespaces.nexusNs.name | quote }}
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
  {{- with .Values.nexusRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  host: {{ .Values.nexusRoute.host }}
  to:
    kind: Service
    name: {{ include "nexus.service.headless" . }}
    weight: 100
  port:
    targetPort: nexus-ui
  {{- if .Values.nexusRoute.tls.enabled }}
  tls:
    termination: {{ .Values.nexusRoute.tls.termination }}
    insecureEdgeTerminationPolicy: {{ .Values.nexusRoute.tls.insecureEdgeTerminationPolicy }}
  {{- end }}
{{- if .Values.nexusRoute.additionalHosts }}
{{- range .Values.nexusRoute.additionalHosts }}
---
# Additional UI Route: {{ .host }} — uses wildcardTls
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "nexus.fullname" $ }}-ui-{{ .name }}
  namespace: {{ default $.Release.Namespace $.Values.namespaces.nexusNs.name | quote }}
  labels:
    {{- include "nexus.labels" $ | nindent 4 }}
  {{- with $.Values.nexusRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  host: {{ .host }}
  to:
    kind: Service
    name: {{ include "nexus.service.headless" $ }}
    weight: 100
  port:
    targetPort: nexus-ui
  {{- if $.Values.wildcardTls.enabled }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
    {{- $cert := include "nexus.wildcardTls.cert" $ }}
    {{- if $cert }}
    certificate: |
      {{ $cert | nindent 6 }}
    {{- end }}
    {{- $key := include "nexus.wildcardTls.key" $ }}
    {{- if $key }}
    key: |
      {{ $key | nindent 6 }}
    {{- end }}
    {{- $ca := include "nexus.wildcardTls.ca" $ }}
    {{- if $ca }}
    caCertificate: |
      {{ $ca | nindent 6 }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
