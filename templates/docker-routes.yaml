{{ if .Values.nexus.docker.enabled -}}
{{ $root := . }}
{{- range $registry := .Values.nexus.docker.registries }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "nexus.fullname" $root | trunc 35 }}-dkr-{{ $registry.repo | trunc 20 }}
  namespace: {{ default $root.Release.Namespace $root.Values.namespaces.nexusNs.name | quote }}
  labels:
    {{- include "nexus.labels" $root | nindent 4 }}
  annotations:
    haproxy.router.openshift.io/balance: "source"
    haproxy.router.openshift.io/timeout: "600s"
    haproxy.router.openshift.io/timeout-tunnel: "3600s"
    haproxy.router.openshift.io/disable_cookies: "true"
spec:
  host: {{ $registry.host }}.nexus-t01.sunrise.ch
  to:
    kind: Service
    name: {{ include "nexus.fullname" $root | trunc 54 }}-docker
    weight: 100
  port:
    targetPort: docker-{{ $registry.port }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
    {{- $cert := include "nexus.wildcardTls.cert" $root }}
    {{- if $cert }}
    certificate: |
      {{ $cert | nindent 6 }}
    {{- end }}
    {{- $key := include "nexus.wildcardTls.key" $root }}
    {{- if $key }}
    key: |
      {{ $key | nindent 6 }}
    {{- end }}
    {{- $ca := include "nexus.wildcardTls.ca" $root }}
    {{- if $ca }}
    caCertificate: |
      {{ $ca | nindent 6 }}
    {{- end }}
---
{{- end }}
{{- end }}
